<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EFOOTBALL PRO | TOURNAMENT MANAGER</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --blue: #3B82F6;
      --blue-dark: #2563EB;
      --green: #10B981;
      --yellow: #F59E0B;
      --red: #EF4444;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 20% 20%, #0d1a35 0%, #030712 60%);
      min-height: 100vh;
    }
    h1, h2, h3, .heading { font-family: 'Barlow Condensed', sans-serif; }

    .glass-panel {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.7);
    }
    .match-card {
      background: rgba(15, 23, 42, 0.85);
      border-left: 4px solid #3B82F6;
      transition: all 0.2s ease;
      border-radius: 0.9rem;
    }
    .match-card:hover { border-left-color: #60A5FA; background: rgba(30, 41, 59, 0.95); transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(59,130,246,0.35);
      border-radius: 999px;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.04em;
    }
    .btn-primary:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(59,130,246,0.5); }

    .standings-row { border-bottom: 1px solid rgba(59, 130, 246, 0.12); transition: 0.1s; }
    .top4-glow { background: linear-gradient(90deg, rgba(59,130,246,0.10), rgba(16,185,129,0.04)); border-left: 3px solid #3B82F6; }

    .knockout-card {
      background: linear-gradient(145deg, #0F172A, #0B0F1C);
      border-radius: 1.2rem;
      border: 1px solid rgba(59,130,246,0.25);
    }

    .badge-win { background: rgba(16,185,129,0.15); color: #34D399; border: 1px solid rgba(16,185,129,0.4); border-radius: 999px; padding: 2px 12px; font-size: 0.68rem; font-weight: 700; }
    .badge-draw { background: rgba(245,158,11,0.15); color: #FBBF24; border: 1px solid rgba(245,158,11,0.4); border-radius: 999px; padding: 2px 12px; font-size: 0.68rem; font-weight: 700; }
    .badge-loss { background: rgba(239,68,68,0.15); color: #F87171; border: 1px solid rgba(239,68,68,0.4); border-radius: 999px; padding: 2px 12px; font-size: 0.68rem; font-weight: 700; }

    .custom-scroll::-webkit-scrollbar { width: 5px; }
    .custom-scroll::-webkit-scrollbar-track { background: #1E293B; border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #3B82F6; border-radius: 10px; }

    select { outline: none; appearance: none; -webkit-appearance: none; }

    /* Admin padlock button */
    .padlock-btn {
      position: fixed;
      bottom: 22px;
      right: 22px;
      width: 46px;
      height: 46px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 900;
      border: 1px solid rgba(59,130,246,0.4);
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .padlock-btn:hover { background: #2563EB; transform: scale(1.08); }
    .padlock-btn.admin-active { background: #10B981; border-color: #10B981; }
    .padlock-btn.admin-active:hover { background: #059669; }

    /* Admin mode indicator strip */
    .admin-strip {
      position: fixed;
      bottom: 22px;
      right: 80px;
      background: linear-gradient(135deg, #059669, #10B981);
      padding: 7px 16px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.06em;
      z-index: 900;
      box-shadow: 0 0 16px rgba(16,185,129,0.45);
      display: none;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-box {
      background: rgba(15,23,42,0.97);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 1.5rem;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.7);
    }
    input[type="password"] {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 0.8rem;
      padding: 0.6rem 1rem;
      color: white;
      width: 100%;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #3B82F6; outline: none; }

    /* View-only badge */
    .view-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 11px;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.05em;
      color: #94A3B8;
    }

    /* Responsive grid fix */
    @media (max-width: 1024px) {
      .main-grid { display: flex; flex-direction: column; gap: 1.5rem; }
      .fixtures-grid { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 640px) {
      .header-title { font-size: 2.2rem !important; }
      .glass-panel { border-radius: 1.1rem; padding: 1rem !important; }
      .match-card { border-radius: 0.7rem; }
    }

    /* Champion celebration */
    .champion-banner {
      background: linear-gradient(135deg, #7C3AED20, #F59E0B20);
      border: 1px solid #F59E0B50;
      border-radius: 1.2rem;
      padding: 1.25rem 1.5rem;
    }
  </style>
</head>
<body class="text-gray-200 p-4 md:p-6 lg:p-8">

  <div class="max-w-[1600px] mx-auto">

    <!-- HEADER -->
    <div class="flex flex-wrap justify-between items-start mb-7 gap-3">
      <div>
        <h1 class="header-title text-5xl font-black tracking-tight leading-none" style="font-family:'Barlow Condensed',sans-serif; background: linear-gradient(135deg, #60A5FA, #818CF8, #A78BFA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
          <i class="fas fa-futbol" style="-webkit-text-fill-color: #60A5FA;"></i> EFOOTBALL PRO
        </h1>
        <p class="text-gray-500 mt-1 text-xs tracking-wide"><i class="far fa-calendar-alt mr-1"></i> Round Robin · Top 4 Advance · Knockouts</p>
      </div>
      <div class="flex items-center gap-3 flex-wrap">
        <!-- Admin: Reset button — only visible in admin mode -->
        <button id="resetBtn" onclick="resetTournament()" class="hidden bg-red-500/80 hover:bg-red-600 text-white px-5 py-2 rounded-full text-xs font-bold tracking-wide transition shadow-lg" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:0.06em;">
          <i class="fas fa-undo-alt mr-2"></i>RESET TOURNAMENT
        </button>
        <div id="viewerBadge" class="view-badge">
          <i class="fas fa-eye"></i> VIEW ONLY
        </div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid lg:grid lg:grid-cols-3 gap-7">

      <!-- STANDINGS -->
      <div class="lg:col-span-1 glass-panel p-5">
        <div class="flex items-center gap-2 border-b border-white/10 pb-3 mb-4">
          <i class="fas fa-trophy text-yellow-400 text-lg"></i>
          <h2 class="text-2xl font-black tracking-wide" style="font-family:'Barlow Condensed',sans-serif;">LEAGUE TABLE</h2>
          <span class="text-xs bg-blue-500/25 text-blue-300 px-2 py-0.5 rounded-full ml-1">W3·D1·L0</span>
        </div>
        <div id="standingsContainer" class="space-y-1 text-sm"></div>
        <div class="mt-4 text-center text-xs text-gray-500 border-t border-white/10 pt-3">
          Win = 3 pts &nbsp;|&nbsp; Draw = 1 pt &nbsp;|&nbsp; Loss = 0
        </div>
      </div>

      <!-- RIGHT: FIXTURES + KNOCKOUT -->
      <div class="lg:col-span-2 flex flex-col gap-7">

        <div class="glass-panel p-5">
          <div class="flex justify-between items-center flex-wrap gap-2 mb-4">
            <h2 class="text-2xl font-black tracking-wide" style="font-family:'Barlow Condensed',sans-serif;">
              <i class="fas fa-list-ol mr-2 text-blue-400"></i>ROUND ROBIN · 15 MATCHES
            </h2>
            <span class="text-xs bg-white/8 px-3 py-1 rounded-full text-gray-400 border border-white/10">
              <i class="far fa-clock mr-1"></i>Official Results
            </span>
          </div>
          <div id="roundRobinMatches" class="fixtures-grid grid md:grid-cols-2 gap-3 max-h-[520px] overflow-y-auto pr-1 custom-scroll"></div>
        </div>

        <div class="glass-panel p-5">
          <h2 class="text-2xl font-black mb-4 tracking-wide" style="font-family:'Barlow Condensed',sans-serif;">
            <i class="fas fa-bolt text-yellow-400 mr-2"></i>KNOCKOUT STAGE
          </h2>
          <div id="knockoutArea" class="space-y-5"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- Padlock button -->
  <div class="padlock-btn" id="padlockBtn" title="Admin access">
    <i class="fas fa-lock text-blue-300 text-base" id="padlockIcon"></i>
  </div>

  <!-- Admin mode strip -->
  <div class="admin-strip" id="adminStrip">
    <i class="fas fa-user-shield mr-1"></i> ADMIN MODE
  </div>

  <!-- ======================= SCRIPT ======================= -->
  <script>
    const ADMIN_PASSWORD = "shimul123";
    const PLAYERS = ["Shimul", "Daud", "Anin", "Turja", "Farhan", "Sahib"];

    const RR_FIXTURES = [
      { id: 0,  home: "Shimul", away: "Sahib",  round: 1 },
      { id: 1,  home: "Daud",   away: "Farhan", round: 1 },
      { id: 2,  home: "Anin",   away: "Turja",  round: 1 },
      { id: 3,  home: "Shimul", away: "Farhan", round: 2 },
      { id: 4,  home: "Turja",  away: "Sahib",  round: 2 },
      { id: 5,  home: "Daud",   away: "Anin",   round: 2 },
      { id: 6,  home: "Shimul", away: "Turja",  round: 3 },
      { id: 7,  home: "Anin",   away: "Farhan", round: 3 },
      { id: 8,  home: "Daud",   away: "Sahib",  round: 3 },
      { id: 9,  home: "Shimul", away: "Anin",   round: 4 },
      { id: 10, home: "Daud",   away: "Turja",  round: 4 },
      { id: 11, home: "Farhan", away: "Sahib",  round: 4 },
      { id: 12, home: "Shimul", away: "Daud",   round: 5 },
      { id: 13, home: "Anin",   away: "Sahib",  round: 5 },
      { id: 14, home: "Turja",  away: "Farhan", round: 5 }
    ];

    let matchResults = new Array(15).fill(null);
    let semi1 = { home: null, away: null, winner: null, played: false };
    let semi2 = { home: null, away: null, winner: null, played: false };
    let finalMatch = { home: null, away: null, winner: null, played: false };
    let isAdmin = false;

    // ===== STORAGE =====
    function save() {
      localStorage.setItem("efootball_pro_v2", JSON.stringify({ matchResults, semi1, semi2, finalMatch }));
    }
    function load() {
      const raw = localStorage.getItem("efootball_pro_v2");
      if (!raw) return;
      try {
        const d = JSON.parse(raw);
        matchResults = d.matchResults || new Array(15).fill(null);
        semi1 = d.semi1 || { home: null, away: null, winner: null, played: false };
        semi2 = d.semi2 || { home: null, away: null, winner: null, played: false };
        finalMatch = d.finalMatch || { home: null, away: null, winner: null, played: false };
      } catch(e) {}
    }

    // ===== STANDINGS =====
    function computeStandings() {
      let stats = {};
      PLAYERS.forEach(p => { stats[p] = { played: 0, won: 0, draw: 0, lost: 0, points: 0 }; });
      RR_FIXTURES.forEach((match, idx) => {
        const res = matchResults[idx];
        if (!res) return;
        const { home, away } = match;
        stats[home].played++; stats[away].played++;
        if (res === "home")      { stats[home].won++; stats[home].points += 3; stats[away].lost++; }
        else if (res === "away") { stats[away].won++; stats[away].points += 3; stats[home].lost++; }
        else if (res === "draw") { stats[home].draw++; stats[home].points++; stats[away].draw++; stats[away].points++; }
      });
      return PLAYERS.map(p => ({ name: p, ...stats[p] })).sort((a, b) => b.points - a.points);
    }
    function getTop4() { return computeStandings().slice(0, 4).map(s => s.name); }

    function syncKnockout() {
      const top4 = getTop4();
      if (top4.length === 4) {
        if (!semi1.played) { semi1.home = top4[0]; semi1.away = top4[3]; }
        if (!semi2.played) { semi2.home = top4[1]; semi2.away = top4[2]; }
      }
      if (!semi1.played) semi1.winner = null;
      if (!semi2.played) semi2.winner = null;
      if (semi1.played && semi2.played && semi1.winner && semi2.winner) {
        finalMatch.home = semi1.winner;
        finalMatch.away = semi2.winner;
      } else if (!finalMatch.played) { finalMatch.home = null; finalMatch.away = null; }
    }

    // ===== RESULT SETTERS =====
    function setRRResult(idx, result) {
      if (!isAdmin) return;
      matchResults[idx] = result;
      if (!semi1.played) { semi1.winner = null; }
      if (!semi2.played) { semi2.winner = null; }
      if (!finalMatch.played) { finalMatch.winner = null; }
      syncKnockout();
      save(); renderAll();
    }

    function setKOResult(type, winner) {
      if (!isAdmin) return;
      if (type === 'semi1' && semi1.home && semi1.away && !semi1.played) { semi1.winner = winner; semi1.played = true; }
      if (type === 'semi2' && semi2.home && semi2.away && !semi2.played) { semi2.winner = winner; semi2.played = true; }
      if (type === 'final' && finalMatch.home && finalMatch.away && !finalMatch.played) { finalMatch.winner = winner; finalMatch.played = true; }
      if (semi1.played && semi2.played && semi1.winner && semi2.winner) {
        finalMatch.home = semi1.winner; finalMatch.away = semi2.winner;
      }
      save(); renderAll();
    }

    function resetTournament() {
      if (!isAdmin) return;
      if (!confirm("Reset the entire tournament? This cannot be undone.")) return;
      matchResults = new Array(15).fill(null);
      semi1 = { home: null, away: null, winner: null, played: false };
      semi2 = { home: null, away: null, winner: null, played: false };
      finalMatch = { home: null, away: null, winner: null, played: false };
      syncKnockout(); save(); renderAll();
    }

    // ===== RENDER STANDINGS =====
    function renderStandings() {
      const standings = computeStandings();
      const c = document.getElementById("standingsContainer");
      c.innerHTML = `<div class="grid grid-cols-12 text-xs font-bold text-blue-300/60 pb-2 px-1 border-b border-white/15 mb-1" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:0.05em;">
        <div class="col-span-5">PLAYER</div>
        <div class="col-span-2 text-center">P</div>
        <div class="col-span-2 text-center">W/D/L</div>
        <div class="col-span-3 text-right">PTS</div>
      </div>`;
      standings.forEach((s, idx) => {
        const top = idx < 4;
        c.innerHTML += `<div class="standings-row grid grid-cols-12 items-center py-2 px-1 rounded-lg ${top ? 'top4-glow' : ''}">
          <div class="col-span-5 font-semibold flex items-center gap-2 text-sm">
            <span class="text-blue-300 text-xs w-4 text-center">${idx + 1}</span>
            <span class="${top ? 'text-white' : 'text-gray-300'}">${s.name}</span>
            ${top ? '<span class="text-[8px] text-blue-400 ml-auto mr-1"><i class="fas fa-arrow-up"></i></span>' : ''}
          </div>
          <div class="col-span-2 text-center text-gray-400 text-xs">${s.played}</div>
          <div class="col-span-2 text-center text-xs text-gray-400">${s.won}/${s.draw}/${s.lost}</div>
          <div class="col-span-3 text-right font-black text-base ${s.points >= 9 ? 'text-emerald-300' : 'text-white'}" style="font-family:'Barlow Condensed',sans-serif;">${s.points}</div>
        </div>`;
      });
    }

    // ===== RENDER ROUND ROBIN =====
    function renderRoundRobin() {
      const c = document.getElementById("roundRobinMatches");
      c.innerHTML = "";
      RR_FIXTURES.forEach((match, idx) => {
        const res = matchResults[idx];
        const card = document.createElement("div");
        card.className = "match-card p-3";

        // Result display
        let resultLabel = "", resultBadge = "";
        if (res === "home")  { resultLabel = `${match.home} Won`; resultBadge = `<span class="badge-win">${match.home.toUpperCase()} WON</span>`; }
        else if (res === "away") { resultLabel = `${match.away} Won`; resultBadge = `<span class="badge-win">${match.away.toUpperCase()} WON</span>`; }
        else if (res === "draw") { resultLabel = "Draw"; resultBadge = `<span class="badge-draw">DRAW</span>`; }

        // Admin controls or view-only indicators
        let controls = "";
        if (!res) {
          if (isAdmin) {
            controls = `<select class="bg-black/50 border border-white/15 rounded-full px-3 py-1 text-xs text-gray-200 cursor-pointer" data-matchidx="${idx}">
              <option value="">Set result</option>
              <option value="home">${match.home} wins</option>
              <option value="draw">Draw</option>
              <option value="away">${match.away} wins</option>
            </select>`;
          } else {
            controls = `<span class="text-xs text-gray-600"><i class="fas fa-hourglass-half mr-1"></i>Pending</span>`;
          }
        } else {
          if (isAdmin) {
            controls = `<div class="flex items-center gap-2">${resultBadge}<button class="text-[10px] text-gray-500 hover:text-red-400 transition clear-btn" data-idx="${idx}"><i class="fas fa-times"></i></button></div>`;
          } else {
            controls = resultBadge;
          }
        }

        card.innerHTML = `
          <div class="flex justify-between items-center text-sm font-semibold mb-2">
            <span class="text-white">${match.home}</span>
            <span class="text-xs text-gray-500 font-normal">vs</span>
            <span class="text-white">${match.away}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-[10px] text-gray-500" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:0.05em;">ROUND ${match.round}</span>
            ${controls}
          </div>`;
        c.appendChild(card);
      });

      if (isAdmin) {
        document.querySelectorAll("[data-matchidx]").forEach(sel => {
          sel.addEventListener("change", () => {
            if (sel.value) setRRResult(parseInt(sel.dataset.matchidx), sel.value);
          });
        });
        document.querySelectorAll(".clear-btn").forEach(btn => {
          btn.addEventListener("click", () => setRRResult(parseInt(btn.dataset.idx), null));
        });
      }
    }

    // ===== RENDER KNOCKOUTS =====
    function renderKnockouts() {
      const top4 = getTop4();
      const ko = document.getElementById("knockoutArea");

      if (top4.length < 4) {
        ko.innerHTML = `<div class="text-center py-8 bg-white/4 rounded-2xl text-gray-500 border border-white/8">
          <i class="fas fa-hourglass-half text-2xl mb-2 block text-blue-400/50"></i>
          <p class="text-sm">Complete the round robin to unlock the knockout stage.</p>
        </div>`;
        return;
      }

      syncKnockout();

      function koCard(title, home, away, played, winner, type) {
        let content = `<h3 class="text-lg font-black text-blue-300 mb-3" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:0.06em;"><i class="fas fa-flag mr-1 text-xs"></i>${title}</h3>
          <div class="flex justify-between items-center font-semibold text-base">
            <span class="${played && winner === home ? 'text-emerald-300' : 'text-white'}">${home || '?'}</span>
            <span class="text-xs text-gray-500 font-normal">vs</span>
            <span class="${played && winner === away ? 'text-emerald-300' : 'text-white'}">${away || '?'}</span>
          </div>`;
        if (played && winner) {
          content += `<div class="mt-3 flex items-center gap-2 text-emerald-300 font-bold text-sm"><i class="fas fa-crown text-yellow-400"></i> ${winner} advances</div>`;
        } else if (!played && isAdmin && home && away) {
          content += `<div class="flex gap-2 mt-3">
            <button class="btn-primary text-xs px-4 py-1.5 font-bold ko-btn" data-type="${type}" data-winner="${home}">${home}</button>
            <button class="btn-primary text-xs px-4 py-1.5 font-bold ko-btn" data-type="${type}" data-winner="${away}">${away}</button>
          </div>`;
        } else if (!played) {
          content += `<div class="mt-3 text-gray-600 text-xs flex items-center gap-1"><i class="fas fa-lock"></i> Awaiting result</div>`;
        }
        return `<div class="knockout-card p-4">${content}</div>`;
      }

      let html = `<div class="grid sm:grid-cols-2 gap-4">
        ${koCard('SEMI-FINAL 1', semi1.home, semi1.away, semi1.played, semi1.winner, 'semi1')}
        ${koCard('SEMI-FINAL 2', semi2.home, semi2.away, semi2.played, semi2.winner, 'semi2')}
      </div>`;

      if (semi1.played && semi2.played && semi1.winner && semi2.winner) {
        const fHome = finalMatch.home || semi1.winner;
        const fAway = finalMatch.away || semi2.winner;
        if (finalMatch.played && finalMatch.winner) {
          html += `<div class="champion-banner mt-4 text-center">
            <div class="text-xs text-yellow-400/60 font-bold mb-1" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:0.1em;">GRAND FINAL · CHAMPION</div>
            <div class="text-4xl font-black text-yellow-300" style="font-family:'Barlow Condensed',sans-serif;">
              <i class="fas fa-trophy mr-2 text-yellow-400"></i>${finalMatch.winner}
            </div>
            <div class="text-xs text-gray-500 mt-1">${fHome} vs ${fAway}</div>
          </div>`;
        } else {
          html += `<div class="knockout-card p-5 mt-2" style="background: linear-gradient(135deg, rgba(124,58,237,0.12), rgba(245,158,11,0.08)); border-color: rgba(245,158,11,0.3);">
            <h3 class="text-xl font-black text-yellow-300 mb-3" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:0.06em;"><i class="fas fa-trophy mr-2"></i>GRAND FINAL</h3>
            <div class="flex justify-between items-center text-lg font-bold">
              <span class="text-white">${fHome}</span>
              <span class="text-sm text-gray-500">vs</span>
              <span class="text-white">${fAway}</span>
            </div>
            ${isAdmin ? `<div class="flex gap-3 mt-4">
              <button class="bg-yellow-500/80 hover:bg-yellow-400 px-5 py-2 rounded-full text-sm font-black transition ko-btn" data-type="final" data-winner="${fHome}" style="font-family:'Barlow Condensed',sans-serif;">${fHome} CHAMPION</button>
              <button class="bg-yellow-500/80 hover:bg-yellow-400 px-5 py-2 rounded-full text-sm font-black transition ko-btn" data-type="final" data-winner="${fAway}" style="font-family:'Barlow Condensed',sans-serif;">${fAway} CHAMPION</button>
            </div>` : `<div class="mt-3 text-gray-500 text-xs flex items-center gap-1"><i class="fas fa-lock"></i> Awaiting final result</div>`}
          </div>`;
        }
      }

      ko.innerHTML = html;

      if (isAdmin) {
        document.querySelectorAll(".ko-btn").forEach(btn => {
          btn.addEventListener("click", () => setKOResult(btn.dataset.type, btn.dataset.winner));
        });
      }
    }

    function renderAll() { renderStandings(); renderRoundRobin(); renderKnockouts(); }

    // ===== ADMIN UNLOCK =====
    function applyAdminUI() {
      document.getElementById("resetBtn").classList.remove("hidden");
      document.getElementById("viewerBadge").style.display = "none";
      document.getElementById("adminStrip").style.display = "flex";
      const btn = document.getElementById("padlockBtn");
      btn.classList.add("admin-active");
      document.getElementById("padlockIcon").className = "fas fa-lock-open text-white text-base";
    }

    function showAdminModal() {
      if (isAdmin) {
        // Already admin — clicking again exits admin mode
        if (confirm("Exit admin mode?")) {
          isAdmin = false;
          localStorage.removeItem("efootball_admin_session");
          document.getElementById("resetBtn").classList.add("hidden");
          document.getElementById("viewerBadge").style.display = "";
          document.getElementById("adminStrip").style.display = "none";
          const btn = document.getElementById("padlockBtn");
          btn.classList.remove("admin-active");
          document.getElementById("padlockIcon").className = "fas fa-lock text-blue-300 text-base";
          renderAll();
        }
        return;
      }

      const overlay = document.createElement("div");
      overlay.className = "modal-overlay";
      overlay.innerHTML = `
        <div class="modal-box text-center">
          <div class="w-12 h-12 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-user-shield text-2xl text-blue-400"></i>
          </div>
          <h2 class="text-2xl font-black mb-1" style="font-family:'Barlow Condensed',sans-serif;">ADMIN ACCESS</h2>
          <p class="text-gray-500 text-xs mb-5">Enter password to enable editing</p>
          <input type="password" id="adminPassInput" placeholder="Password" autofocus>
          <button id="confirmBtn" class="btn-primary w-full py-2.5 mt-4 font-bold text-sm" style="font-family:'Barlow Condensed',sans-serif; letter-spacing:0.05em;">
            UNLOCK <i class="fas fa-chevron-right ml-1 text-xs"></i>
          </button>
          <button id="cancelBtn" class="w-full mt-3 text-gray-500 hover:text-gray-300 text-xs transition">Cancel</button>
          <p id="wrongMsg" class="text-red-400 text-xs mt-2 hidden">Wrong password. Try again.</p>
        </div>`;
      document.body.appendChild(overlay);

      const input = document.getElementById("adminPassInput");
      const confirm_btn = document.getElementById("confirmBtn");
      const cancel_btn = document.getElementById("cancelBtn");
      const wrongMsg = document.getElementById("wrongMsg");

      function tryLogin() {
        if (input.value === ADMIN_PASSWORD) {
          isAdmin = true;
          localStorage.setItem("efootball_admin_session", "true");
          applyAdminUI();
          document.body.removeChild(overlay);
          renderAll();
        } else {
          wrongMsg.classList.remove("hidden");
          input.value = "";
          input.focus();
        }
      }

      confirm_btn.addEventListener("click", tryLogin);
      input.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });
      cancel_btn.addEventListener("click", () => document.body.removeChild(overlay));
      overlay.addEventListener("click", e => { if (e.target === overlay) document.body.removeChild(overlay); });
    }

    // ===== INIT =====
    load();
    // Check saved session — still require page-load session validation
    if (localStorage.getItem("efootball_admin_session") === "true") {
      isAdmin = true;
      // Defer UI apply until after DOM is ready
      document.addEventListener("DOMContentLoaded", () => {});
      applyAdminUI();
    }
    syncKnockout();
    renderAll();

    document.getElementById("padlockBtn").addEventListener("click", showAdminModal);
  </script>
</body>
</html>
